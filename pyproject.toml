[tool.poetry]
name = "haxballgym"
version = "0.5.7"
description = "HaxBallGym is a python package that can be used to treat the game HaxBall as though it were an OpenAI-style environment for Reinforcement Learning projects."
authors = ["Wazarr <jeje_04@live.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
ursinaxball = { git = "https://github.com/HaxballGym/Ursinaxball" }
gym = "^0.26.2"
numpy = ">=1.0,<2.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
