name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync (builds the Rust core + installs deps)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check haxballgym/haxballgym

      - name: Rust format check
        run: cargo fmt --check --manifest-path rust/haxball_core/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path rust/haxball_core/Cargo.toml --quiet

      - name: Clone Ursinaxball (numpy reference for the fidelity cross-check)
        run: git clone --depth 1 https://github.com/HaxballGym/Ursinaxball.git ../Ursinaxball

      - name: Tests
        run: |
          uv run rust/haxball_core/tests/test_fidelity.py
          uv run haxballgym/tests/test_stadium_geometry.py
          uv run haxballgym/tests/test_stadium_loader.py
          uv run haxballgym/tests/test_env.py
          uv run haxballgym/tests/test_real_engine.py
